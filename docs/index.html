<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/photo_edit/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="PhotoEdit — free online photo editor. Filters, adjustments, AI enhance, selective edits, crop, draw, text and stickers. Everything runs in your browser.">
  <meta name="theme-color" content="#101014">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PhotoEdit">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PhotoEdit — Online Photo Editor</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #101014;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #101014;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #splash h1 {
      color: #ececf1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.3px;
    }
    #splash .bar {
      width: 120px;
      height: 3px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }
    #splash .bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #7C4DFF, #00BCD4);
      animation: splash-slide 1.1s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes splash-slide {
      0% { margin-left: -40%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="PhotoEdit">
    <h1>PhotoEdit</h1>
    <div class="bar"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.style.opacity = '0';
      setTimeout(function () { splash.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
